<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>谁是你的宝可梦伙伴？ - 宝可梦人格测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23FF5350' stroke='%23000' stroke-width='4'/><rect x='4' y='46' width='92' height='8' fill='%23000'/><circle cx='50' cy='50' r='20' fill='%23fff' stroke='%23000' stroke-width='4'/><circle cx='50' cy='50' r='10' fill='%23fff' stroke='%23000' stroke-width='2'/></svg>">
  <style>
    :root {
      --primary: #FF5350;
      --secondary: #FFCB05;
      --accent: #3B5CA8;
      --background: #1a1a2e;
      --surface: #252541;
      --surface-light: #3a3a5c;
      --text: #FFFFFF;
      --text-muted: #a0a0b0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--secondary);
      opacity: 0.3;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% {
        transform: translateY(-100px) rotate(720deg);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 650px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      animation: fadeInDown 0.6s ease-out;
    }

    .pokeball-icon {
      width: 60px;
      height: 60px;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .logo h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      text-align: center;
      animation: fadeInDown 0.6s ease-out 0.1s both;
    }

    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    .welcome {
      text-align: center;
    }

    .welcome-text {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .welcome-emoji {
      font-size: 4rem;
      margin-bottom: 24px;
      display: block;
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 16px 48px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #ff7b7b);
      color: white;
      box-shadow: 0 8px 30px rgba(255, 83, 80, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(255, 83, 80, 0.5);
    }

    .btn-secondary {
      background: var(--surface-light);
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-secondary:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }

    .question-container {
      display: none;
    }

    .question-container.active {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .progress-container {
      margin-bottom: 32px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 8px;
      background: var(--surface-light);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
      border-radius: 4px;
      transition: width 0.4s ease-out;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .question-number {
      display: inline-block;
      background: linear-gradient(135deg, var(--secondary), #ffd54f);
      color: var(--background);
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      background: var(--surface-light);
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 18px 24px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      width: 100%;
      text-align: left;
    }

    .option:hover {
      background: #4a4a6a;
      transform: translateX(8px);
      border-color: var(--secondary);
    }

    .option.selected {
      background: linear-gradient(135deg, var(--primary), #ff7b7b);
      border-color: var(--primary);
      transform: translateX(8px);
      box-shadow: 0 8px 30px rgba(255, 83, 80, 0.3);
    }

    .option-letter {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .option.selected .option-letter {
      background: rgba(255, 255, 255, 0.3);
    }

    .result-container {
      display: none;
      text-align: center;
    }

    .result-container.active {
      display: block;
      animation: fadeInUp 0.6s ease-out;
    }

    .result-header {
      font-size: 1.2rem;
      color: var(--secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .result-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      margin-bottom: 24px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pokemon-showcase {
      position: relative;
      margin-bottom: 32px;
    }

    .pokemon-image-container {
      position: relative;
      display: inline-block;
    }

    .pokemon-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
      opacity: 0.3;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.2; }
    }

    .pokemon-image {
      position: relative;
      width: 200px;
      height: 200px;
      object-fit: contain;
      animation: pokemonEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
    }

    @keyframes pokemonEnter {
      0% {
        opacity: 0;
        transform: scale(0) rotate(-10deg);
      }
      50% {
        opacity: 1;
        transform: scale(1.1) rotate(5deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    .sparkles {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 250px;
      height: 250px;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--secondary);
      border-radius: 50%;
      animation: sparkle 1.5s ease-in-out infinite;
    }

    .sparkle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 20%; right: 15%; animation-delay: 0.2s; }
    .sparkle:nth-child(3) { bottom: 20%; left: 10%; animation-delay: 0.4s; }
    .sparkle:nth-child(4) { bottom: 15%; right: 20%; animation-delay: 0.6s; }
    .sparkle:nth-child(5) { top: 50%; left: 5%; animation-delay: 0.8s; }
    .sparkle:nth-child(6) { top: 50%; right: 5%; animation-delay: 1s; }

    @keyframes sparkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
    }

    .pokemon-name {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      margin-bottom: 8px;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    .pokemon-number {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }

    .personality-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }

    .personality-tag {
      background: linear-gradient(135deg, var(--accent), #5a7cc8);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .result-description {
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 32px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      animation: fadeInUp 0.6s ease-out 0.6s both;
      text-align: left;
    }

    .result-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      animation: fadeInUp 0.6s ease-out 0.7s both;
    }

    .compatibility {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--surface-light);
      animation: fadeInUp 0.6s ease-out 0.8s both;
    }

    .compatibility-title {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .compatibility-bar {
      height: 8px;
      background: var(--surface-light);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .compatibility-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 4px;
      transition: width 1s ease-out 1s;
      width: 0;
    }

    .compatibility-text {
      font-weight: 700;
      color: var(--secondary);
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.active {
      display: block;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid var(--surface-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px 16px;
      }

      .logo h1 {
        font-size: 1.5rem;
      }

      .pokeball-icon {
        width: 48px;
        height: 48px;
      }

      .card {
        padding: 28px 20px;
        border-radius: 20px;
      }

      .question-text {
        font-size: 1.2rem;
      }

      .pokemon-image {
        width: 160px;
        height: 160px;
      }

      .pokemon-glow {
        width: 180px;
        height: 180px;
      }

      .pokemon-name {
        font-size: 1.8rem;
      }

      .result-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--background);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface-light);
      border-radius: 4px;
    }

    ::selection {
      background: var(--primary);
      color: white;
    }

    .btn:focus-visible,
    .option:focus-visible {
      outline: 3px solid var(--secondary);
      outline-offset: 3px;
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

  </div>

  {id:6,name:"喷火龙",personalities:["冒险型","勇敢型","挑战型","自由型"],description:"你是真正的火焰化身，如同展翅高飞的喷火龙般威风凛凛。冒险是你生命的意义，自由是你永恒的追求。你不甘于平凡，总是向着更高的天空挑战自我，这种精神令人敬佩。"},
  {id:7,name:"杰尼龟",personalities:["温和型","理性型","谨慎型","合作型"],description:"你像杰尼龟一样冷静睿智，从不轻易冲动行事。你的处世哲学是稳扎稳打，用智慧而非蛮力解决问题。你是团队中最可靠的存在，大家都知道有你在就一定不会出错。"},
  {id:8,name:"卡咪龟",personalities:["温和型","理性型","可靠型","守护型"],description:"你拥有沉稳如水的气质，如同进化后的卡咪龟般值得信赖。你善于用温和的方式照顾身边的每一个人，是朋友们最温暖的港湾。你的守护如同水流般温柔而持久。"},
  {id:9,name:"水箭龟",personalities:["理性型","谨慎型","可靠型","守护型"],description:"你是坚不可摧的堡垒，如同水箭龟强大的龟壳一般。你的理性与冷静让你在危机时刻做出最正确的判断，而你的可靠则让所有人都对你充满信任。"},
  {id:10,name:"绿毛虫",personalities:["自然型","纯真型","成长型","乐观型"],description:"你保持着最纯真的心灵，如同森林中无忧无虑的绿毛虫。虽然看起来平凡，但你的成长潜力是无限的！你用乐观的态度面对一切，相信自己终会化蝶高飞。"},
  {id:11,name:"铁甲蛹",personalities:["自然型","内敛型","成长型","专注型"],description:"你正处于沉淀积累的关键时刻，如同铁甲蛹一般看似静止，实则内蕴巨大的能量。你懂得在适当的时机保持低调，蓄势待发，等待着破茧而出的那一刻。"},
  {id:12,name:"巴大蝶",personalities:["自然型","自由型","梦幻型","温柔型"],description:"你的心灵如翅膀般轻盈自由，如同随风飞舞的巴大蝶。你拥有梦幻般的想象力，能够看到别人看不到的美好世界。你的温柔让每一个靠近你的人都感到安心。"},
  {id:13,name:"独角虫",personalities:["活力型","乐观型","成长型","自然型"],description:"你小小的身体里蕴含着大大的梦想，如同不起眼的独角虫一般。虽然现在还不够强大，但你相信只要努力，终有一天会蜕变成令人惊叹的存在。"},
  {id:14,name:"铁壳蛹",personalities:["内敛型","专注型","成长型","自然型"],description:"你正在经历生命中重要的转变期，如同铁壳蛹一般静静等待蜕变。你懂得耐心等待的意义，知道真正的力量需要时间来沉淀。"},
  {id:15,name:"大针蜂",personalities:["活力型","进取型","挑战型","自由型"],description:"你拥有强烈的进取心，如同大针蜂一般充满活力与斗志。你不喜欢被束缚，追求绝对的自由。虽然有时会显得冲动，但这是你追求梦想的方式。"},
  {id:16,name:"波波",personalities:["活力型","乐观型","自由型","社交型"],description:"你像波波一样活泼可爱，总是给周围带来欢乐的气息。你喜欢自由飞翔的感觉，对世界充满好奇。你的乐观感染着每一个人。"},
  {id:17,name:"比比鸟",personalities:["冒险型","自由型","优雅型","进取型"],description:"你已经准备好展翅高飞，如同比比鸟一般翱翔天际。你追求更高的目标，从不满足于现状。优雅是你的代名词，在追求梦想的路上你始终保持从容。"},
  {id:18,name:"大比鸟",personalities:["冒险型","自由型","守护型","优雅型"],description:"你是天空中的王者，如同大比鸟一般威严而优雅。你既有征服天空的野心，也有守护同伴的温柔。在你心中，自由与责任同样重要。"},
  {id:19,name:"小拉达",personalities:["活力型","机智型","适应型","务实型"],description:"你拥有极强的环境适应能力，如同小拉达一般无论身处何地都能生存下来。你务实而机智，懂得如何在复杂的世界中找到自己的生存之道。"},
  {id:20,name:"拉达",personalities:["机智型","适应型","务实型","可靠型"],description:"你是真正的生存专家，如同拉达一般拥有惊人的适应力。你不挑环境，不惧挑战，总能找到前进的道路。务实是你的人生哲学。"},
  {id:21,name:"烈雀",personalities:["活力型","挑战型","勇敢型","自由型"],description:"你有着不服输的精神，如同烈雀一般敢于挑战任何强敌。虽然体型不大，但你拥有与之不匹配的勇气。你的自由灵魂不允许你向任何人低头。"},
  {id:22,name:"大嘴雀",personalities:["冒险型","自由型","挑战型","力量型"],description:"你是天空中的猎手，如同大嘴雀一般锐利而强大。你追求极致的速度与力量，享受在空中自由翱翔的感觉。你的人生信条是：没有什么是不可能的。"},
  {id:23,name:"阿柏蛇",personalities:["神秘型","机智型","内向型","冷静型"],description:"你有着深不可测的一面，如同阿柏蛇一般神秘而优雅。你不轻易表露情感，但内心世界却无比丰富。冷静是你面对一切的态度。"},
  {id:24,name:"阿柏怪",personalities:["神秘型","力量型","挑战型","冷静型"],description:"你是丛林中真正的王者，如同阿柏怪一般威严而致命。你拥有冷静的头脑和强大的力量，是令所有对手都敬畏的存在。神秘是你的魅力所在。"},
  {id:25,name:"皮卡丘",personalities:["活力型","社交型","可爱型","乐观型"],description:"你就像皮卡丘一样充满活力与可爱的魅力！你的笑容有着超强的感染力，能让周围所有人都感受到快乐。你活泼开朗，永远保持着一颗童心。"},
  {id:26,name:"雷丘",personalities:["活力型","机智型","挑战型","可靠型"],description:"你拥有强大的能量，如同进化后的雷丘一般电力十足。你既有可爱的外表，也有聪明的头脑。在关键时刻，你总是能够爆发出惊人的力量。"},
  {id:27,name:"穿山鼠",personalities:["内敛型","防御型","谨慎型","适应型"],description:"你有着出色的防御本能，如同穿山鼠一般懂得保护自己。你善于在各种环境中生存，适应能力极强。你不张扬，但内心无比坚强。"},
  {id:28,name:"穿山王",personalities:["防御型","可靠型","挑战型","内敛型"],description:"你是坚不可摧的堡垒，如同穿山王一般拥有强大的防御能力。你可靠而稳重，是朋友们最坚实的后盾。你的力量来自于内心的坚定。"},
  {id:29,name:"尼多兰",personalities:["温柔型","可爱型","社交型","情感型"],description:"你如尼多兰一般温柔可爱，散发着柔和的气息。你重视情感的交流，渴望被爱与爱护。你的存在就像温暖的阳光，让人忍不住想要靠近。"},
  {id:30,name:"尼多娜",personalities:["温柔型","治愈型","情感型","守护型"],description:"你拥有温柔的内心与强大的母性本能，如同尼多娜一般充满爱心。你善于照顾他人，是朋友们的知心姐姐。你的温暖能够治愈一切伤痛。"},
  {id:31,name:"尼多后",personalities:["温柔型","守护型","可靠型","力量型"],description:"你是温柔与力量的完美结合，如同尼多后一般既有女性的温柔，也有强大的保护能力。你会不惜一切代价守护你所爱的人。"},
  {id:32,name:"尼多朗",personalities:["活力型","勇敢型","挑战型","乐观型"],description:"你拥有旺盛的生命力，如同尼多朗一般充满朝气。你勇敢无畏，敢于面对任何挑战。乐观是你的标签，你相信一切都会好起来。"},
  {id:33,name:"尼多王",personalities:["勇敢型","挑战型","力量型","可靠型"],description:"你是力量与威严的化身，如同尼多王一般拥有王者的气质。你的勇气无人能及，你的力量令人敬畏。但你内心深处依然保留着柔软的一面。"},
  {id:34,name:"皮皮",personalities:["温柔型","治愈型","社交型","可爱型"],description:"你就像皮皮一样充满爱心，是天生的治愈者。你的温柔与可爱能够融化一切坚冰，让周围的人都感受到幸福与温暖。"},
  {id:35,name:"皮可西",personalities:["温柔型","治愈型","守护型","社交型"],description:"你是月光下的守护天使，如同皮可西一般温柔而强大。你用爱与温柔守护着身边的每一个人，是所有人最温暖的精神支柱。"},
  {id:36,name:"六尾",personalities:["神秘型","优雅型","自由型","智慧型"],description:"你拥有神秘而优雅的气质，如同六尾一般美丽而高傲。你不喜欢被打扰，保留着一定的神秘感。你的智慧让你能够看透很多事情。"},
  {id:37,name:"九尾",personalities:["神秘型","智慧型","优雅型","力量型"],description:"你是智慧与力量的完美结合，如同九尾一般拥有超凡脱俗的气质。你的每一个举动都充满优雅，你的话语总是蕴含着深刻的哲理。"},
  {id:38,name:"胖丁",personalities:["可爱型","乐观型","社交型","艺术型"],description:"你就像胖丁一样可爱迷人，是天生的开心果。你的歌声能够治愈心灵，你的乐观能够感染所有人。艺术是你表达情感的方式。"},
  {id:39,name:"胖可丁",personalities:["可爱型","温柔型","社交型","艺术型"],description:"你是艺术与可爱的完美结合，如同胖可丁一般能用歌声传递温暖。你善于用柔和的方式与人交流，是天生的社交高手。"},
  {id:40,name:"超音蝠",personalities:["内敛型","神秘型","适应型","自由型"],description:"你在黑暗中寻找自由，如同超音蝠一般不畏艰难。你适应能力极强，能够在任何环境中生存。你享受独处的时光，在寂静中思考人生。"},
  {id:41,name:"大嘴蝠",personalities:["神秘型","挑战型","自由型","力量型"],description:"你是黑暗中的猎手，如同大嘴蝠一般拥有独特的生存之道。你追求绝对的实力，在挑战中不断成长。你的自由灵魂不允许任何束缚。"},
  {id:42,name:"摩鲁蛾",personalities:["神秘型","自由型","优雅型","夜间型"],description:"你是夜晚最美的存在，如同摩鲁蛾一般在月光下翩翩起舞。你的美是神秘而朦胧的，你享受夜的静谧与自由。"},
  {id:43,name:"走路草",personalities:["自然型","治愈型","温和型","乐观型"],description:"你如走路草一般贴近大自然，总能发现生活中最简单的美好。你乐观向上，用自己的方式传递着积极能量，让周围的人也跟着快乐起来。"},
  {id:44,name:"臭臭花",personalities:["自然型","独特型","幽默型","乐观型"],description:"你虽然有着独特的气味，但内心却无比美好，正如臭臭花一般。你幽默风趣，能够发现别人看不到的乐趣。你的乐观让一切困难都变得不再可怕。"},
  {id:45,name:"霸王花",personalities:["自然型","优雅型","力量型","治愈型"],description:"你是花园中的女王，如同霸王花一般美丽而强大。你的花瓣蕴含着治愈的力量，你的存在让周围的一切都变得更加美好。优雅是你永恒的气质。"},
  {id:46,name:"派拉斯",personalities:["自然型","勤劳型","内敛型","成长型"],description:"你像派拉斯一样勤劳踏实，从不偷懒。你懂得一分耕耘一分收获的道理，脚踏实地地朝着目标前进。你相信只要努力，终会有所成就。"},
  {id:47,name:"派海星",personalities:["自然型","勤劳型","可靠型","成长型"],description:"你是勤劳的典范，如同派海星一般默默耕耘。你不善言辞，但用行动证明一切。你的可靠性让所有人都对你放心，你是最值得信赖的伙伴。"},
  {id:48,name:"毛球",personalities:["自然型","内敛型","神秘型","感知型"],description:"你拥有超强的感知能力，如同毛球一般能察觉最微弱的变化。你内敛而神秘，喜欢在安静的地方思考。你的直觉总是准确无误。"},
  {id:49,name:"末入蛾",personalities:["神秘型","感知型","夜间型","优雅型"],description:"你是夜晚的精灵，如同末入蛾一般在月光下优雅飞舞。你拥有敏锐的感知力，能察觉到别人忽略的细节。神秘是你的魅力。"},
  {id:50,name:"地鼠",personalities:["勤劳型","适应型","务实型","内敛型"],description:"你埋头苦干从不张扬，如同地鼠一般默默努力。你适应能力超强，无论环境多么恶劣都能生存。务实是你的人生信条。"},
  {id:51,name:"三地鼠",personalities:["机智型","适应型","协作型","力量型"],description:"你们是完美的团队，如同三地鼠一般默契配合。你们分工明确，效率超高。适应力与协作能力让你们能够完成任何挑战。"},
  {id:52,name:"喵喵",personalities:["机智型","社交型","魅力型","独立型"],description:"你聪明伶俐又魅力四射，如同喵喵一般总能成为焦点。你有着独立的精神，喜欢用自己的方式生活。你的机智让你能够巧妙应对各种情况。"},
  {id:53,name:"猫老大",personalities:["优雅型","独立型","自信型","魅力型"],description:"你是天生的贵族，如同猫老大一般优雅而自信。你不喜欢被束缚，追求高品质的生活。你的每一个举动都散发着独特的魅力。"},
  {id:54,name:"可达鸭",personalities:["内敛型","独特型","纯真型","幽默型"],description:"你有着独特的思维方式，虽然看起来有点呆萌，但内心却无比纯真。你不在意别人的眼光，坚持做自己。你的存在本身就是一种独特的魅力。"},
  {id:55,name:"哥达鸭",personalities:["智慧型","理性型","优雅型","力量型"],description:"你拥有超乎寻常的智慧，如同哥达鸭进化后的形态一般优雅而强大。你冷静理性，总能在关键时刻做出正确的判断。"},
  {id:56,name:"猴怪",personalities:["活力型","挑战型","勇敢型","热情型"],description:"你精力充沛如同猴怪，总是充满战斗的热情。你勇于挑战自我，从不畏惧强敌。热情是你的标签，你的活力能感染身边的每一个人。"},
  {id:57,name:"火暴猴",personalities:["挑战型","力量型","勇敢型","热情型"],description:"你是力量与激情的化身，如同火暴猴一般充满能量。你有着不屈不挠的战斗精神，总是全力以赴。热情是你生命的燃料。"},
  {id:58,name:"卡蒂狗",personalities:["忠诚型","热情型","勇敢型","温柔型"],description:"你有着最忠诚的灵魂，如同卡蒂狗一般永远不离不弃。你热情似火，温柔起来又能融化一切。你是最值得拥有的伙伴。"},
  {id:59,name:"风速狗",personalities:["优雅型","力量型","守护型","忠诚型"],description:"你是优雅与力量的完美结合，如同风速狗一般既美丽又强大。你有着强烈的守护本能，对所爱的人绝对忠诚。你的存在本身就是一种守护。"},
  {id:60,name:"蚊香蝌蚪",personalities:["自然型","纯真型","适应型","乐观型"],description:"你纯真无邪如同蚊香蝌蚪，对世界充满好奇。你适应能力很强，能够在各种环境中成长。乐观让你总能发现生活中的美好。"},
  {id:61,name:"蚊香蛙",personalities:["理性型","谨慎型","力量型","保护型"],description:"你冷静而强大，如同蚊香蛙一般有着出色的战斗能力。你谨慎稳重，从不轻敌。你的保护本能让你成为朋友们的坚强后盾。"},
  {id:62,name:"蚊香泳士",personalities:["力量型","守护型","理性型","可靠型"],description:"你是水中的守护神，如同蚊香泳士一般拥有强大的力量与守护心。你稳重可靠，是最值得信赖的伙伴。你的力量只为保护重要的人而存在。"},
  {id:63,name:"凯西",personalities:["神秘型","智慧型","内向型","感知型"],description:"你拥有强大的超能力，如同凯西一般神秘莫测。你喜欢独处思考，智慧超群。你的感知能力非凡，能察觉到常人无法感知的领域。"},
  {id:64,name:"勇吉拉",personalities:["智慧型","神秘型","理性型","力量型"],description:"你是智慧与力量的完美结合，如同勇吉拉一般拥有超凡的能力。你理性冷静，从不感情用事。你的存在透着一种神秘的高人气质。"},
  {id:65,name:"胡地",personalities:["智慧型","神秘型","力量型","超然型"],description:"你拥有宇宙级的智慧，如同胡地一般知识渊博得令人惊叹。你的超能力强大而神秘，已然超越凡人的境界。你是智者中的智者。"},

  {id:67,name:"豪力",personalities:["力量型","可靠型","挑战型","热血型"],description:"你是力量的象征，如同豪力一般肌肉结实力量惊人。你可靠稳重，是朋友们的依靠。你的热血让你在战斗中永不退缩。"},

      { text: "悬疑推理类，挑战思维", personalities: ["智慧型", "好奇型", "理性型"] },
      { text: "温馨治愈类，温暖心灵", personalities: ["治愈型", "温柔型", "感性型"] }
    ]
  },
  {
    question: "如果可以改变自己的一件事，你会选择什么？",
    options: [
      { text: "变得更勇敢，无惧任何挑战", personalities: ["勇敢型", "挑战型", "进取型"] },
      { text: "变得更聪明，知识渊博", personalities: ["智慧型", "理性型", "好奇型"] },
      { text: "变得更温柔，善待他人", personalities: ["温柔型", "治愈型", "感性型"] },
      { text: "保持现状，接受真实的自己", personalities: ["自信型", "自由型", "独特型"] }
    ]
  },
  {
    question: "你希望给这个世界留下什么？",
    options: [
      { text: "创造伟大的事业，被人铭记", personalities: ["王者型", "力量型", "挑战型"] },
      { text: "帮助很多人，传递温暖与爱", personalities: ["治愈型", "守护型", "善良型"] },
      { text: "留下宝贵的知识和智慧", personalities: ["智慧型", "理性型", "传承型"] },
      { text: "开心过每一天，享受当下", personalities: ["乐观型", "自由型", "治愈型"] }
    ]
  }
];

// 状态
let state = {
  currentQuestion: 0,
  answers: [],
  personalityScores: {},
  result: null
};

// 初始化粒子
function initParticles() {
  const container = document.getElementById('particles');
  const particleCount = 30;

  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.width = (Math.random() * 4 + 2) + 'px';
    particle.style.height = particle.style.width;
    particle.style.animationDelay = (Math.random() * 15) + 's';
    particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
    container.appendChild(particle);
  }
}

// 开始测试
function startTest() {
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('questionScreen').classList.add('active');
  renderQuestion();
}

// 渲染问题
function renderQuestion() {
  const question = QUESTIONS[state.currentQuestion];
  const progress = ((state.currentQuestion + 1) / QUESTIONS.length) * 100;

  document.getElementById('questionNumber').textContent = `问题 ${state.currentQuestion + 1}/${QUESTIONS.length}`;
  document.getElementById('questionText').textContent = question.question;
  document.getElementById('progressText').textContent = `第 ${state.currentQuestion + 1} 题`;
  document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
  document.getElementById('progressFill').style.width = progress + '%';

  const optionsContainer = document.getElementById('optionsContainer');
  const letters = ['A', 'B', 'C', 'D'];

  optionsContainer.innerHTML = question.options.map((option, index) => `
    <button class="option" onclick="selectAnswer(${index})" data-index="${index}">
      <span class="option-letter">${letters[index]}</span>
      <span class="option-text">${option.text}</span>
    </button>
  `).join('');

  document.getElementById('questionScreen').classList.remove('active');
  void document.getElementById('questionScreen').offsetWidth;
  document.getElementById('questionScreen').classList.add('active');
}

// 选择答案
function selectAnswer(optionIndex) {
  const question = QUESTIONS[state.currentQuestion];
  const selectedOption = question.options[optionIndex];

  document.querySelectorAll('.option').forEach((opt, idx) => {
    opt.classList.toggle('selected', idx === optionIndex);
  });

  state.answers.push({
    questionIndex: state.currentQuestion,
    selectedPersonalities: selectedOption.personalities
  });

  selectedOption.personalities.forEach(personality => {
    state.personalityScores[personality] = (state.personalityScores[personality] || 0) + 1;
  });

  setTimeout(() => {
    if (state.currentQuestion < QUESTIONS.length - 1) {
      state.currentQuestion++;
      renderQuestion();
    } else {
      showLoading();
    }
  }, 400);
}

// 显示加载
function showLoading() {
  document.getElementById('questionScreen').classList.remove('active');
  document.getElementById('questionScreen').classList.add('hidden');
  document.getElementById('loadingScreen').classList.add('active');

  setTimeout(() => {
    calculateResult();
  }, 2500);
}

// 计算结果
function calculateResult() {
  let maxScore = 0;
  let topPersonalities = [];

  for (const [personality, score] of Object.entries(state.personalityScores)) {
    if (score > maxScore) {
      maxScore = score;
      topPersonalities = [personality];
    } else if (score === maxScore) {
      topPersonalities.push(personality);
    }
  }

  const dominantPersonality = topPersonalities[Math.floor(Math.random() * topPersonalities.length)];

  // 优先匹配前3个最高分的性格
  const sortedPersonalities = Object.entries(state.personalityScores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([p]) => p);

  const matchedPokemon = POKEMON_DATABASE.filter(pokemon =>
    pokemon.personalities.some(p => sortedPersonalities.includes(p))
  );

  const candidatePokemon = matchedPokemon.length > 0 ? matchedPokemon : POKEMON_DATABASE;
  state.result = candidatePokemon[Math.floor(Math.random() * candidatePokemon.length)];

  // 计算匹配度 (70% - 99%)
  const baseMatch = 70;
  const maxPossibleScore = QUESTIONS.length * 3;
  const actualScore = Object.values(state.personalityScores).reduce((a, b) => a + b, 0);
  const matchBonus = Math.floor((actualScore / maxPossibleScore) * 29);
  state.result.matchRate = Math.min(baseMatch + matchBonus, 99);

  showResult();
}

// 显示结果
function showResult() {
  document.getElementById('loadingScreen').classList.remove('active');
  document.getElementById('resultScreen').classList.add('active');

  const pokemon = state.result;

  document.getElementById('pokemonName').textContent = pokemon.name;
  document.getElementById('pokemonNumber').textContent = `No. ${String(pokemon.id).padStart(4, '0')}`;
  document.getElementById('resultDescription').textContent = pokemon.description + '\n\n— By 悠然时光';
  document.getElementById('compatibilityText').textContent = pokemon.matchRate + '%';

  const tagsHtml = pokemon.personalities.slice(0, 4).map(p =>
    `<span class="personality-tag">${p}</span>`
  ).join('');
  document.getElementById('personalityTags').innerHTML = tagsHtml;

  const img = document.getElementById('pokemonImage');
  // 使用 jsDelivr CDN（国内加速，微信兼容）
  img.src = `https://cdn.jsdelivr.net/gh/PokeAPI/sprites@master/sprites/pokemon/other/official-artwork/${pokemon.id}.png`;
  img.alt = pokemon.name;
  
  // 添加 loading 状态
  img.style.opacity = '0';
  img.style.transition = 'opacity 0.5s ease';
  img.onload = function() {
    this.style.opacity = '1';
  };
  
  img.onerror = function() {
    // 备用源1：pokeres
    this.src = `https://pokeres.bastionbot.org/images/pokemon/${pokemon.id}.png`;
    this.onerror = function() {
      // 备用源2：Pokemon Wiki
      this.src = `https://archives.bulbapedia.curbpedia.net/images/pokemon/${pokemon.id}.png`;
      this.onerror = function() {
        // 最终备用：显示问号
        this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%23ddd"/><text x="50" y="55" text-anchor="middle" font-size="12" fill="%23999">?</text></svg>';
        this.style.opacity = '1';
      };
    };
  };

  setTimeout(() => {
    document.getElementById('compatibilityFill').style.width = pokemon.matchRate + '%';
  }, 100);
}

// 分享结果
function shareResult() {
  const pokemon = state.result;
  const shareUrl = 'https://sebuntsuki.github.io/pokemon-quiz/';
  const text = `🔮 我的宝可梦伙伴测试结果出来了！

我最适合的宝可梦是「${pokemon.name}」！
灵魂契合度: ${pokemon.matchRate}%

性格标签: ${pokemon.personalities.join('、')}

你也来测试一下 → ${shareUrl}`;

  if (navigator.share) {
    navigator.share({
      title: '宝可梦伙伴测试',
      text: text,
      url: shareUrl
    });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('结果已复制到剪贴板！快去分享给朋友吧！🎉');
    });
  }
}

// 重置测试
function resetTest() {
  state.currentQuestion = 0;
  state.answers = [];
  state.personalityScores = {};
  state.result = null;

  document.getElementById('resultScreen').classList.remove('active');
  document.getElementById('loadingScreen').classList.remove('active');
  document.getElementById('questionScreen').classList.remove('active');
  document.getElementById('questionScreen').classList.add('hidden');
  document.getElementById('welcomeScreen').classList.remove('hidden');
  document.getElementById('compatibilityFill').style.width = '0';
  
  // 清除已选择的选项样式
  document.querySelectorAll('.option').forEach(opt => {
    opt.classList.remove('selected');
  });
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', initParticles);
</script>
